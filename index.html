                'close': '閉じる',
                'maintenance': 'メンテナンス',
                'event': 'イベント',
                'update': 'アップデート',
                'normal': '普通',
                'important': '重要',
                'urgent': '緊急',
                'edit': '編集',
                'delete': '削除',
                'search': '検索',
                'language': '言語',
                'chinese': '中文',
                'english': 'English',
                'japanese': '日本語'
            }
        };

        // DOM元素
        const announcementsListMobile = document.getElementById('announcements-list-mobile');
        const announcementsListDesktop = document.getElementById('announcements-list-desktop');
        const announcementContentMobile = document.getElementById('announcement-content-mobile');
        const announcementContentDesktop = document.getElementById('announcement-content');
        const tabButtons = document.querySelectorAll('.tab-button');
        const languageToggle = document.getElementById('language-toggle');
        const languageDropdown = document.getElementById('language-dropdown');
        const languageOptions = document.querySelectorAll('.language-option');
        const currentLanguageSpan = document.getElementById('current-language');
        const closeBtn = document.getElementById('close-btn');
        const addAnnouncementBtn = document.getElementById('add-announcement-btn');
        const editPanel = document.getElementById('edit-panel');
        const announcementForm = document.getElementById('announcement-form');
        const cancelEditBtn = document.getElementById('cancel-edit');

        // 初始化页面
        function initPage() {
            setupEventListeners();
            updateLanguage(currentLanguage);
            renderAnnouncements(); // 直接渲染公告数据
        }

        // 渲染公告列表
        function renderAnnouncements() {
            const data = getFilteredAnnouncements();
            
            // 清空并渲染移动端列表
            announcementsListMobile.innerHTML = '';
            // 清空并渲染桌面端列表
            announcementsListDesktop.innerHTML = '';
            
            if (data.length === 0) {
                const noDataHTML = `
                    <div class="text-center py-8">
                        <i class="fa fa-info-circle text-4xl text-primary mb-4"></i>
                        <p class="text-lg">${translations[currentLanguage].noAnnouncementsFound}</p>
                    </div>
                `;
                announcementsListMobile.innerHTML = noDataHTML;
                announcementsListDesktop.innerHTML = noDataHTML;
                return;
            }
            
            data.forEach(announcement => {
                // 获取当前语言的公告内容
                const translation = getAnnouncementTranslation(announcement);
                
                // 根据重要程度设置前缀图标
                let importanceIcon = '';
                if (announcement.importance === 'important') {
                    importanceIcon = '<i class="fa fa-exclamation-circle text-yellow-500 mr-2"></i>';
                } else if (announcement.importance === 'urgent') {
                    importanceIcon = '<i class="fa fa-exclamation-triangle text-red-500 mr-2"></i>';
                } else {
                    importanceIcon = '<i class="fa fa-bullhorn text-primary mr-2"></i>';
                }

                // 创建桌面端列表项
                const desktopItem = document.createElement('div');
                desktopItem.className = 'announcement-item p-3 hover:bg-primary hover:bg-opacity-20 cursor-pointer';
                desktopItem.setAttribute('data-id', announcement.id);
                desktopItem.innerHTML = `
                    <div class="flex items-start">
                        <div class="flex-1">
                            <h3 class="font-medium text-primary">${importanceIcon}${translation.title}</h3>
                            <p class="text-sm text-secondary mt-1">${formatDate(announcement.date)}</p>
                        </div>
                    </div>
                `;
                announcementsListDesktop.appendChild(desktopItem);

                // 创建移动端列表项 (卡片样式)
                const mobileItem = document.createElement('div');
                mobileItem.className = 'announcement-item flex-shrink-0 w-64 glass-effect rounded-lg shadow-md overflow-hidden cursor-pointer';
                mobileItem.setAttribute('data-id', announcement.id);
                mobileItem.innerHTML = `
                    <div class="p-3">
                        <div class="flex items-center mb-2">
                            <span class="text-xs px-2 py-1 rounded-full ${announcement.importance === 'urgent' ? 'bg-red-100 text-red-800' : announcement.importance === 'important' ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800'}">${translations[currentLanguage][announcement.importance]}</span>
                        </div>
                        <h3 class="font-medium text-primary text-sm line-clamp-2 h-10">${translation.title}</h3>
                        <p class="text-xs text-secondary mt-1">${formatDate(announcement.date)}</p>
                    </div>
                `;
                announcementsListMobile.appendChild(mobileItem);
                
                // 为桌面端和移动端列表项添加点击事件
                [desktopItem, mobileItem].forEach(item => {
                    item.addEventListener('click', () => {
                        // 移除所有活动状态
                        document.querySelectorAll('.announcement-item').forEach(i => {
                            i.classList.remove('active-announcement');
                            i.style.backgroundColor = 'transparent';
                            i.style.margin = '8px';
                            i.style.border = '1px solid transparent';
                            i.style.boxShadow = 'none';
                        });
                        
                        // 添加活动状态到当前项 (桌面端)
                        desktopItem.style.backgroundColor = 'rgba(204, 207, 225, 0.3)';
                        desktopItem.style.border = '1px solid #CCCFE1';
                        desktopItem.style.boxShadow = '0 0 15px rgba(204, 207, 225, 0.8)';
                        
                        // 添加活动状态到当前项 (移动端)
                        mobileItem.style.backgroundColor = 'rgba(204, 207, 225, 0.5)';
                        mobileItem.style.boxShadow = '0 0 15px rgba(204, 207, 225, 0.8)';
                        
                        // 更新当前选中的公告ID
                        currentAnnouncementId = announcement.id;
                        
                        // 显示公告详情
                        showAnnouncementDetail(announcement);
                    });
                });
            });
            
            // 如果有公告且没有选中的公告，默认选中第一个
            if (data.length > 0 && currentAnnouncementId === null) {
                const firstDesktopItem = announcementsListDesktop.querySelector('.announcement-item');
                if (firstDesktopItem) {
                    firstDesktopItem.click();
                }
            } else if (currentAnnouncementId !== null) {
                // 如果有选中的公告ID，尝试选中对应项
                const selectedItem = announcementsListDesktop.querySelector(`[data-id="${currentAnnouncementId}"]`);
                if (selectedItem) {
                    selectedItem.click();
                } else {
                    // 如果找不到选中的公告，选中第一个
                    const firstItem = announcementsListDesktop.querySelector('.announcement-item');
                    if (firstItem) {
                        firstItem.click();
                    }
                }
            }
        }

        // 获取过滤后的公告
        function getFilteredAnnouncements() {
            // 根据当前标签筛选公告
            let filteredByTab = [];
            if (currentTab === 'game') {
                // 游戏公告包括维护和更新公告
                filteredByTab = announcementsData.filter(announcement => 
                    announcement.category === 'maintenance' || announcement.category === 'update'
                );
            } else if (currentTab === 'event') {
                // 活动公告只包括活动类别
                filteredByTab = announcementsData.filter(announcement => 
                    announcement.category === 'event'
                );
            } else {
                filteredByTab = announcementsData;
            }
            
            // 按日期降序排序（最新的在前）
            filteredByTab.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            return filteredByTab;
        }

        // 显示公告详情
        function showAnnouncementDetail(announcement) {
            // 获取当前语言的公告内容
            const translation = getAnnouncementTranslation(announcement);
            
            // 设置分类图标
            let categoryIcon = '';
            if (announcement.category === 'maintenance') {
                categoryIcon = 'https://p9-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/45cc3869c9d049a8a806493290ea5782~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202603140037235FD019D614C566978751&rrcfp=f06b921b&x-expires=1776011877&x-signature=WJRWoWskCxDk43%2F5XhowOhMgqIQ%3D';
            } else if (announcement.category === 'event') {
                categoryIcon = 'https://p3-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/ab16ebe2aebd4152a93cf78d0b67eca7~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202603140037235FD019D614C566978751&rrcfp=f06b921b&x-expires=1776011877&x-signature=wwZnQF0h4XJzx6qSTDDwe2BYcRY%3D';
            } else if (announcement.category === 'update') {
                categoryIcon = 'https://p3-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/9ce5953e46784f2db0a5b75411ef4006~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202603140037235FD019D614C566978751&rrcfp=f06b921b&x-expires=1776011877&x-signature=WsuAZfzcUcXRD8vtpRbYY9%2BY238%3D';
            }
            
            // 设置重要程度标签
            let importanceLabel = '';
            let importanceClass = '';
            
            if (announcement.importance === 'normal') {
                importanceLabel = translations[currentLanguage].normal;
                importanceClass = 'bg-green-100 text-green-800';
            } else if (announcement.importance === 'important') {
                importanceLabel = translations[currentLanguage].important;
                importanceClass = 'bg-yellow-100 text-yellow-800';
            } else if (announcement.importance === 'urgent') {
                importanceLabel = translations[currentLanguage].urgent;
                importanceClass = 'bg-red-100 text-red-800';
            }
            
            // 构建详情HTML
            let detailHtml = `
                <h2 class="text-xl font-bold mb-4 text-primary">${translation.title}</h2>
                <div class="flex items-center text-sm mb-4">
                    <img src="${categoryIcon}" alt="${announcement.category}" class="w-5 h-5 mr-2">
                    <span class="mr-4">${translations[currentLanguage][announcement.category]}</span>
                    <span class="mr-4">${formatDate(announcement.date)}</span>
                    <span class="px-2 py-1 rounded-full text-xs ${importanceClass}">${importanceLabel}</span>
                </div>
            `;
            
            // 如果有图片，添加到内容前面
            if (translation.image) {
                detailHtml += `
                    <div class="mb-4">
                        <img src="${translation.image}" alt="${translation.title}" class="w-full h-48 object-cover rounded-md">
                    </div>
                `;
            }
            
            // 添加内容（将换行符转换为<br>标签）
            detailHtml += `
                <div class="prose max-w-none whitespace-pre-line">${translation.content}</div>
            `;
            
            // 更新移动端和桌面端的内容
            announcementContentMobile.innerHTML = detailHtml;
            announcementContentDesktop.innerHTML = detailHtml;
        }



        // 更新语言
        function updateLanguage(lang) {
            currentLanguage = lang;
            
            // 更新语言按钮文本
            if (lang === 'zh-CN') {
                currentLanguageSpan.textContent = '中文';
            } else if (lang === 'en-US') {
                currentLanguageSpan.textContent = 'English';
            } else if (lang === 'ja-JP') {
                currentLanguageSpan.textContent = '日本語';
            }
            
            // 更新页面文本
            document.title = translations[lang].gameAnnouncementCenter;
            document.getElementById('oh-my-goddess').textContent = translations[lang].ohMyGoddess;
            
            // 更新标签按钮文本
            tabButtons.forEach(button => {
                const langKey = button.getAttribute('data-lang-key');
                if (langKey === 'maintenanceAnnouncements') {
                    button.textContent = translations[lang].maintenanceAnnouncements + ' (✧∇✧)';
                } else if (langKey === 'eventAnnouncements') {
                    button.textContent = translations[lang].eventAnnouncements + ' (≧∇≦)';
                }
            });
            
            // 重新渲染公告列表
            renderAnnouncements();
            
            // 如果当前有选中的公告，重新显示详情
            if (currentAnnouncementId !== null) {
                const announcement = announcementsData.find(a => a.id === currentAnnouncementId);
                if (announcement) {
                    showAnnouncementDetail(announcement);
                }
            }
        }

        // 格式化日期
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString(currentLanguage === 'zh-CN' ? 'zh-CN' : currentLanguage === 'ja-JP' ? 'ja-JP' : 'en-US');
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 标签切换
            tabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    // 移除所有活动状态
                    tabButtons.forEach(btn => {
                        btn.classList.remove('bg-white', 'text-primary', 'border', 'border-b-0', 'border-primary');
                        btn.classList.add('hover:bg-white', 'hover:bg-opacity-50');
                    });
                    
                    // 添加活动状态到当前按钮
                    button.classList.add('bg-white', 'text-primary', 'border', 'border-b-0', 'border-primary', 'active');
                    button.classList.remove('hover:bg-white', 'hover:bg-opacity-50');
                    
                    // 获取标签
                    currentTab = button.getAttribute('data-tab');
                    
                    // 重置选中的公告ID
                    currentAnnouncementId = null;
                    
                    // 重新渲染公告
                    renderAnnouncements();
                });
            });
            
            // 语言切换
            languageToggle.addEventListener('click', () => {
                languageDropdown.classList.toggle('hidden');
            });
            
            // 语言选项
            languageOptions.forEach(option => {
                option.addEventListener('click', (e) => {
                    e.preventDefault();
                    const lang = option.getAttribute('data-lang');
                    updateLanguage(lang);
                    languageDropdown.classList.add('hidden');
                });
            });
            
            // 点击其他地方关闭语言下拉菜单
            document.addEventListener('click', (e) => {
                if (!languageToggle.contains(e.target) && !languageDropdown.contains(e.target)) {
                    languageDropdown.classList.add('hidden');
                }
            });
            
            // 关闭按钮
            closeBtn.addEventListener('click', () => {
                window.close();
            });
            

        }

        // 初始化页面
        document.addEventListener('DOMContentLoaded', initPage);
    </script>

</body></html>
